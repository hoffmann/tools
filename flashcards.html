<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards</title>
<style>
  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --border: #e0ddd8;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --correct: #16a34a;
    --correct-hover: #15803d;
    --incorrect: #dc2626;
    --incorrect-hover: #b91c1c;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  .app { max-width: 720px; margin: 0 auto; }

  h1.app-title {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 28px;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  /* Views */
  .view { display: none; }
  .view.active { display: block; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
  }

  /* Buttons */
  button {
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    padding: 10px 18px;
    transition: background 0.15s, transform 0.1s;
  }
  button:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: var(--accent-hover); }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--bg); color: var(--text); }

  .btn-correct {
    background: var(--correct);
    color: white;
    font-size: 1rem;
    padding: 12px 28px;
  }
  .btn-correct:hover { background: var(--correct-hover); }

  .btn-incorrect {
    background: var(--incorrect);
    color: white;
    font-size: 1rem;
    padding: 12px 28px;
  }
  .btn-incorrect:hover { background: var(--incorrect-hover); }

  .btn-danger {
    background: transparent;
    color: var(--incorrect);
    border: 1px solid var(--incorrect);
    font-size: 0.85rem;
    padding: 6px 12px;
  }
  .btn-danger:hover { background: #fef2f2; }

  /* Deck list view */
  .deck-list { display: flex; flex-direction: column; gap: 12px; }

  .deck-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: var(--shadow);
  }

  .deck-info { flex: 1; min-width: 0; }

  .deck-name {
    font-weight: 600;
    font-size: 1rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .deck-meta {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .deck-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state p { margin-bottom: 20px; font-size: 1rem; }

  /* Import view */
  .form-group { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  input[type="text"], textarea {
    width: 100%;
    font-family: inherit;
    font-size: 0.95rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--accent); }

  textarea {
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 0.85rem;
    resize: vertical;
    min-height: 220px;
  }

  .form-actions { display: flex; gap: 10px; margin-top: 20px; }

  .parse-preview {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 8px;
    min-height: 20px;
  }

  /* Study view */
  .study-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .study-deck-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .study-counter {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.3s ease;
  }

  .card-question {
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1.35;
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }

  .card-hint {
    color: var(--text-muted);
    font-size: 0.92rem;
    line-height: 1.6;
    margin-bottom: 20px;
    padding: 12px 14px;
    background: var(--bg);
    border-radius: 8px;
    border-left: 3px solid var(--border);
  }
  .card-hint:empty { display: none; }

  .card-answer {
    border-top: 1px solid var(--border);
    padding-top: 22px;
    margin-bottom: 24px;
    color: var(--text);
    line-height: 1.65;
    font-size: 0.97rem;
  }

  .card-answer h1, .card-answer h2, .card-answer h3,
  .card-answer h4, .card-answer h5, .card-answer h6 {
    font-size: 1rem;
    font-weight: 600;
    margin: 14px 0 6px;
  }

  .card-answer p { margin-bottom: 10px; }

  .card-answer ul, .card-answer ol {
    margin: 8px 0 10px 22px;
  }

  .card-answer li { margin-bottom: 4px; }

  .card-answer code {
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 0.85em;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
  }

  .card-answer pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    overflow-x: auto;
    margin: 10px 0;
  }

  .card-answer pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 0.85rem;
  }

  .card-answer strong { font-weight: 600; }
  .card-answer em { font-style: italic; }
  .card-answer blockquote {
    border-left: 3px solid var(--border);
    padding-left: 14px;
    color: var(--text-muted);
    margin: 10px 0;
  }

  .study-actions { display: flex; gap: 12px; }

  .reveal-wrap { display: flex; justify-content: flex-start; }

  .answer-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* Summary view */
  .summary-header { text-align: center; margin-bottom: 28px; }
  .summary-header h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
  .summary-score {
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.03em;
  }
  .summary-score span { font-size: 1.1rem; font-weight: 400; color: var(--text-muted); }

  .summary-table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0 28px;
    font-size: 0.9rem;
  }

  .summary-table th {
    text-align: left;
    padding: 8px 10px;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }

  .summary-table td {
    padding: 10px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  .summary-table tr:last-child td { border-bottom: none; }

  .accuracy-good { color: var(--correct); font-weight: 600; }
  .accuracy-bad { color: var(--incorrect); font-weight: 600; }
  .accuracy-mid { color: #ca8a04; font-weight: 600; }

  .summary-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  /* Nav back button */
  .nav-back {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .section-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .view-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .badge {
    display: inline-block;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-left: 8px;
  }
</style>
</head>
<body>
<div class="app">
  <h1 class="app-title">Flashcards</h1>

  <!-- View: Deck List -->
  <div id="view-decks" class="view active">
    <div class="view-header">
      <div class="section-title" id="decks-title">Your Decks</div>
      <button class="btn-primary" onclick="showImport()">+ New Deck</button>
    </div>
    <div class="deck-list" id="deck-list"></div>
  </div>

  <!-- View: Import -->
  <div id="view-import" class="view">
    <div class="nav-back">
      <button class="btn-ghost" onclick="showDecks()">← Back</button>
    </div>
    <div class="section-title" id="import-title">New Deck</div>
    <div class="card">
      <div class="form-group">
        <label for="deck-name-input">Deck Name</label>
        <input type="text" id="deck-name-input" placeholder="e.g. Biology 101" />
      </div>
      <div class="form-group">
        <label for="markdown-input">Paste Markdown</label>
        <textarea id="markdown-input" placeholder="# Card Title&#10;&#10;Card answer content goes here.&#10;&#10;## Another Card&#10;&#10;More content..."></textarea>
        <div class="parse-preview" id="parse-preview"></div>
      </div>
      <div class="form-actions">
        <button class="btn-primary" onclick="saveDeck()">Save Deck</button>
        <button class="btn-ghost" onclick="showDecks()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- View: Study -->
  <div id="view-study" class="view">
    <div class="study-header">
      <div class="study-deck-name" id="study-deck-name"></div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="study-counter" id="study-counter"></div>
        <button class="btn-ghost" style="font-size:0.82rem;padding:5px 12px;" onclick="showStats(true)">Stats</button>
      </div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="card" id="study-card">
      <div class="card-question" id="card-question"></div>
      <div class="card-hint" id="card-hint"></div>
      <div id="reveal-section">
        <div class="reveal-wrap">
          <button class="btn-primary" onclick="revealAnswer()">Reveal Answer</button>
        </div>
      </div>
      <div id="answer-section" style="display:none;">
        <div class="card-answer" id="card-answer"></div>
        <div class="answer-actions">
          <button class="btn-correct" onclick="markCard(true)">✓ Correct</button>
          <button class="btn-incorrect" onclick="markCard(false)">✗ Incorrect</button>
        </div>
      </div>
    </div>
    <div style="margin-top:16px;">
      <button class="btn-ghost" onclick="showDecks()" style="font-size:0.85rem;">← Exit Study</button>
    </div>
  </div>

  <!-- View: Stats -->
  <div id="view-stats" class="view">
    <div class="card">
      <div class="summary-header">
        <h2 id="stats-title">Stats</h2>
        <div class="summary-score" id="stats-score"></div>
      </div>
      <table class="summary-table">
        <thead>
          <tr>
            <th>Card</th>
            <th>Correct</th>
            <th>Incorrect</th>
            <th>Accuracy</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="stats-body"></tbody>
      </table>
      <div class="summary-actions" id="stats-actions"></div>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────

const STORAGE_KEY = 'flashcards_app';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { decks: {} };
  } catch { return { decks: {} }; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();
let currentDeck = null;
let session = null; // { pool, mastered, totalCards }

// ── Markdown Parser ───────────────────────────────────────────────────────────

function parseMarkdown(text) {
  const lines = text.split('\n');
  const cards = [];
  let current = null;

  for (const line of lines) {
    const hMatch = line.match(/^(#{1,6})\s+(.+)$/);
    if (hMatch) {
      if (current) cards.push(current);
      current = { heading: hMatch[2].trim(), content: '' };
    } else if (current) {
      current.content += line + '\n';
    }
  }
  if (current) cards.push(current);

  return cards.map(c => ({ ...c, content: c.content.trim() }));
}

function renderMarkdown(text) {
  if (!text) return '';
  let html = '';
  const lines = text.split('\n');
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    // Fenced code block
    if (line.match(/^```/)) {
      const lang = line.slice(3).trim();
      let code = '';
      i++;
      while (i < lines.length && !lines[i].match(/^```/)) {
        code += escHtml(lines[i]) + '\n';
        i++;
      }
      html += `<pre><code${lang ? ` class="language-${escHtml(lang)}"` : ''}>${code}</code></pre>`;
      i++;
      continue;
    }

    // Heading
    const hMatch = line.match(/^(#{1,6})\s+(.+)$/);
    if (hMatch) {
      const level = hMatch[1].length;
      html += `<h${level}>${inlineRender(hMatch[2])}</h${level}>`;
      i++;
      continue;
    }

    // Blockquote
    if (line.startsWith('> ')) {
      let bq = '';
      while (i < lines.length && lines[i].startsWith('> ')) {
        bq += inlineRender(lines[i].slice(2)) + ' ';
        i++;
      }
      html += `<blockquote><p>${bq.trim()}</p></blockquote>`;
      continue;
    }

    // Unordered list
    if (line.match(/^[-*+]\s/)) {
      html += '<ul>';
      while (i < lines.length && lines[i].match(/^[-*+]\s/)) {
        html += `<li>${inlineRender(lines[i].replace(/^[-*+]\s/, ''))}</li>`;
        i++;
      }
      html += '</ul>';
      continue;
    }

    // Ordered list
    if (line.match(/^\d+\.\s/)) {
      html += '<ol>';
      while (i < lines.length && lines[i].match(/^\d+\.\s/)) {
        html += `<li>${inlineRender(lines[i].replace(/^\d+\.\s/, ''))}</li>`;
        i++;
      }
      html += '</ol>';
      continue;
    }

    // Horizontal rule
    if (line.match(/^(---|\*\*\*|___)\s*$/)) {
      html += '<hr>';
      i++;
      continue;
    }

    // Empty line
    if (line.trim() === '') {
      i++;
      continue;
    }

    // Paragraph
    let para = '';
    while (i < lines.length && lines[i].trim() !== '' &&
           !lines[i].match(/^(#{1,6}\s|```|[-*+]\s|\d+\.\s|>\s|---|\*\*\*|___)/)) {
      para += lines[i] + ' ';
      i++;
    }
    if (para.trim()) html += `<p>${inlineRender(para.trim())}</p>`;
  }

  return html;
}

function inlineRender(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/__([^_]+)__/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/_([^_]+)_/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}

function escHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Weighted Random ───────────────────────────────────────────────────────────

function weightedPick(pool, stats) {
  const weights = pool.map(idx => 1 + ((stats[idx]?.incorrect || 0) * 3));
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) {
    r -= weights[i];
    if (r <= 0) return i;
  }
  return pool.length - 1;
}

// ── Navigation ────────────────────────────────────────────────────────────────

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showDecks() {
  renderDeckList();
  showView('view-decks');
}

function showImport(deckName) {
  const titleEl = document.getElementById('import-title');
  const nameInput = document.getElementById('deck-name-input');
  const mdInput = document.getElementById('markdown-input');
  const preview = document.getElementById('parse-preview');

  if (deckName) {
    titleEl.textContent = 'Edit Deck';
    nameInput.value = deckName;
    // Reconstruct markdown from cards
    const deck = state.decks[deckName];
    mdInput.value = deck.cards.map(c => `# ${c.heading}\n\n${c.content}`).join('\n\n');
  } else {
    titleEl.textContent = 'New Deck';
    nameInput.value = '';
    mdInput.value = '';
  }
  preview.textContent = '';
  showView('view-import');
}

// ── Deck List View ────────────────────────────────────────────────────────────

function renderDeckList() {
  const list = document.getElementById('deck-list');
  const names = Object.keys(state.decks);

  if (names.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <p>No decks yet. Create your first deck by pasting a markdown file.</p>
    </div>`;
    return;
  }

  list.innerHTML = names.map(name => {
    const deck = state.decks[name];
    const cardCount = deck.cards.length;
    const stats = deck.stats || {};
    const studied = Object.keys(stats).length;
    const lastStudied = deck.lastStudied
      ? new Date(deck.lastStudied).toLocaleDateString()
      : 'Never';

    return `<div class="deck-item">
      <div class="deck-info">
        <div class="deck-name">${escHtml(name)}</div>
        <div class="deck-meta">${cardCount} card${cardCount !== 1 ? 's' : ''} · Last studied: ${lastStudied}</div>
      </div>
      <div class="deck-actions">
        <button class="btn-ghost" style="font-size:0.85rem;" onclick='showImport(${JSON.stringify(name)})'>Edit</button>
        <button class="btn-primary" onclick='startStudy(${JSON.stringify(name)})'>Study</button>
        <button class="btn-danger" onclick='deleteDeck(${JSON.stringify(name)})'>Delete</button>
      </div>
    </div>`;
  }).join('');
}

function deleteDeck(name) {
  if (!confirm(`Delete deck "${name}"? This cannot be undone.`)) return;
  delete state.decks[name];
  saveState(state);
  renderDeckList();
}

// ── Import View ───────────────────────────────────────────────────────────────

document.getElementById('markdown-input').addEventListener('input', function() {
  const cards = parseMarkdown(this.value);
  const preview = document.getElementById('parse-preview');
  if (cards.length === 0) {
    preview.textContent = this.value.trim() ? 'No headings found — add headings to create cards.' : '';
  } else {
    preview.textContent = `${cards.length} card${cards.length !== 1 ? 's' : ''} detected`;
  }
});

function saveDeck() {
  const nameInput = document.getElementById('deck-name-input');
  const mdInput = document.getElementById('markdown-input');
  const name = nameInput.value.trim();
  const md = mdInput.value.trim();

  if (!name) { alert('Please enter a deck name.'); nameInput.focus(); return; }
  if (!md) { alert('Please paste some markdown content.'); mdInput.focus(); return; }

  const cards = parseMarkdown(md);
  if (cards.length === 0) { alert('No cards found. Add headings (# Title) to create cards.'); return; }

  // Preserve stats for cards that still exist (matched by heading)
  const oldStats = (state.decks[name]?.stats) || {};
  const oldCards = (state.decks[name]?.cards) || [];
  const headingToIdx = {};
  oldCards.forEach((c, i) => { headingToIdx[c.heading] = i; });

  const newStats = {};
  cards.forEach((c, i) => {
    const oldIdx = headingToIdx[c.heading];
    if (oldIdx !== undefined && oldStats[oldIdx]) {
      newStats[i] = { ...oldStats[oldIdx] };
    }
  });

  state.decks[name] = {
    cards,
    stats: newStats,
    created: state.decks[name]?.created || Date.now(),
    lastStudied: state.decks[name]?.lastStudied || null,
  };
  saveState(state);
  showDecks();
}

// ── Study View ────────────────────────────────────────────────────────────────

function startStudy(deckName) {
  currentDeck = deckName;
  const deck = state.decks[deckName];
  deck.lastStudied = Date.now();
  saveState(state);

  session = {
    pool: deck.cards.map((_, i) => i),
    mastered: new Set(),
    totalCards: deck.cards.length,
  };

  document.getElementById('study-deck-name').textContent = deckName;
  showView('view-study');
  nextCard();
}

function nextCard() {
  const deck = state.decks[currentDeck];
  const learned = session.mastered.size;

  document.getElementById('study-counter').textContent = `${learned} / ${session.totalCards} learned`;
  const pct = (learned / session.totalCards) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  if (learned === session.totalCards) {
    showStats(false);
    return;
  }

  const pickIdx = weightedPick(session.pool, deck.stats);
  const cardIdx = session.pool[pickIdx];
  session.pool.splice(pickIdx, 1);
  session.currentCardIdx = cardIdx;

  const card = deck.cards[cardIdx];
  const hrMatch = card.content.match(/^([\s\S]*?)\n---\n([\s\S]*)$/m);
  const hint = hrMatch ? hrMatch[1].trim() : '';
  const answer = hrMatch ? hrMatch[2].trim() : card.content;

  document.getElementById('card-question').textContent = card.heading;
  document.getElementById('card-hint').innerHTML = hint ? renderMarkdown(hint) : '';
  document.getElementById('card-answer').innerHTML = renderMarkdown(answer);

  document.getElementById('reveal-section').style.display = '';
  document.getElementById('answer-section').style.display = 'none';
}

function revealAnswer() {
  document.getElementById('reveal-section').style.display = 'none';
  document.getElementById('answer-section').style.display = '';
}

function markCard(correct) {
  const deck = state.decks[currentDeck];
  const idx = session.currentCardIdx;

  if (!deck.stats[idx]) deck.stats[idx] = { correct: 0, incorrect: 0 };
  if (correct) {
    deck.stats[idx].correct++;
    session.mastered.add(idx);
  } else {
    deck.stats[idx].incorrect++;
    session.pool.push(idx);
  }
  saveState(state);

  nextCard();
}

// ── Stats View ────────────────────────────────────────────────────────────────

function showStats(midSession) {
  const deck = state.decks[currentDeck];
  const cards = deck.cards;

  const learned = session ? session.mastered.size : cards.length;
  const total = cards.length;
  const pct = total > 0 ? Math.round((learned / total) * 100) : 0;

  document.getElementById('stats-title').textContent = midSession ? 'Stats' : 'Session Complete!';
  document.getElementById('stats-score').innerHTML =
    `${learned} / ${total} <span>learned (${pct}%)</span>`;

  const tbody = document.getElementById('stats-body');
  tbody.innerHTML = cards.map((card, idx) => {
    const s = deck.stats[idx] || { correct: 0, incorrect: 0 };
    const totalAttempts = s.correct + s.incorrect;
    const acc = totalAttempts > 0 ? Math.round((s.correct / totalAttempts) * 100) : 0;
    const cls = acc >= 80 ? 'accuracy-good' : acc >= 50 ? 'accuracy-mid' : 'accuracy-bad';
    const mastered = session && session.mastered.has(idx);
    const status = mastered
      ? `<span style="color:var(--correct);font-weight:600;">✓ Learned</span>`
      : `<span style="color:var(--text-muted);">—</span>`;
    return `<tr>
      <td>${escHtml(card.heading)}</td>
      <td style="color:var(--correct)">${s.correct}</td>
      <td style="color:var(--incorrect)">${s.incorrect}</td>
      <td class="${totalAttempts ? cls : ''}">${totalAttempts ? acc + '%' : '—'}</td>
      <td>${status}</td>
    </tr>`;
  }).join('');

  const actions = document.getElementById('stats-actions');
  if (midSession) {
    actions.innerHTML = `<button class="btn-primary" onclick="showView('view-study')">Continue Studying</button>
      <button class="btn-ghost" onclick="showDecks()">Back to Decks</button>`;
  } else {
    actions.innerHTML = `<button class="btn-primary" onclick="startStudy(currentDeck)">Study Again</button>
      <button class="btn-ghost" onclick="showDecks()">Back to Decks</button>`;
  }

  showView('view-stats');
}

// ── Init ──────────────────────────────────────────────────────────────────────

renderDeckList();
</script>
